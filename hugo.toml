baseURL = "https://thenumbercrunch.com"
languageCode = "en-us"
title = "The Number Crunch"
theme = "archie"
copyright = "Ashutosh Pathak"
paginate = 10

[params]
  author = "Ashutosh Pathak"
  description = "Production AI, machine learning, data systems, and the parts between demos and software people can trust."
  math = false
  dark = false

  # Social links
  # twitter = "https://x.com/pathak_jeee"
  # github = "https://github.com/pathak-ashutosh"
  # linkedin = "https://www.linkedin.com/in/pathak-ash/"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/pages/about/"
    weight = 4
  [[menu.main]]
    name = "Contact"
    url = "/pages/contact/"
