<form id="contact-form" action="https://formspree.io/f/meernryl" method="POST" class="contact-form" novalidate>
  <!-- honeypot -->
  <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

  <div class="form-group">
    <label for="cf-name">Name</label>
    <input type="text" id="cf-name" name="name" required placeholder="Your name">
  </div>

  <div class="form-group">
    <label for="cf-email">Email</label>
    <input type="email" id="cf-email" name="email" required placeholder="you@example.com">
  </div>

  <div class="form-group">
    <label for="cf-message">Message</label>
    <textarea id="cf-message" name="message" rows="5" required placeholder="Your message..."></textarea>
  </div>

  <div class="h-captcha" data-sitekey="94ea2bd0-6cf0-48a6-a8d2-9960c99cd046"></div>

  <button type="submit" class="contact-submit">Send message</button>
  <div id="cf-status" class="form-status" role="status"></div>
</form>

<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script>
(function () {
  var form = document.getElementById('contact-form');
  var status = document.getElementById('cf-status');
  function setStatus(message, type) {
    status.textContent = message;
    status.className = 'form-status' + (type ? ' form-' + type : '');
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    var token = form.querySelector('[name="h-captcha-response"]');
    if (!token || !token.value) {
      setStatus('Please complete the CAPTCHA.', 'error');
      return;
    }

    var btn = form.querySelector('.contact-submit');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    setStatus('', '');

    try {
      var res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        setStatus('Message sent. I\'ll get back to you soon.', 'success');
        form.reset();
        if (typeof hcaptcha !== 'undefined') hcaptcha.reset();
      } else {
        var json = await res.json();
        setStatus(json.error || 'Message not sent. Please try again.', 'error');
      }
    } catch (_) {
      setStatus('Message not sent. Check your connection and try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send message';
    }
  });
}());
</script>
